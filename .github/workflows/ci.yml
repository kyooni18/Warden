name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake build-essential libncurses-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build engine library and tests
        run: cmake --build build --target warden_engine test_utils

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Build full game (requires ncurses + Feather)
        run: cmake --build build --target warden
